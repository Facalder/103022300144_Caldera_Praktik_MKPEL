name: CI 

on: 
  push:
    branches: [ main, dev ]
  pull_request: 
    branches [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest 
    steps: 
      - names: Setup JDK 21 java
      - uses: @actions/setup-java@v4
        with: 
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
    steps: 
      - name: Build Test Analayze
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn verify sonar:sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=mkpel -Dsonar.projectKey=mkpel_todo-list-caldera-cli
          